services:
  - type: web
    name: pravah-house-price-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:3001,https://pravah-workshop-n8zn.vercel.app,https://pravah-workshop-n8zn-git-main-thamke00s-projects.vercel.app,https://pravah-workshop-rho.vercel.app,https://pravah-workshop.onrender.com,https://pravah-workshop-qbz0.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"
